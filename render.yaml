services:
  - type: web
    name: hangeul-flash
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPADATA_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
